# ES: Solo se usa si el servicio Railway está en builder NIXPACKS (no Dockerfile).
# EN: Only used when the Railway service builder is NIXPACKS (not Dockerfile).
# Ver README-RAILWAY.md · See README-RAILWAY.md

[phases.setup]
nixPkgs = ["nodejs", "npm"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
