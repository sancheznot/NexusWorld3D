name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Validate content manifest
        run: npm run validate-content

      - name: Validate build assets (warnings OK)
        run: npm run validate-build-assets

      - name: OSS package boundaries
        run: npm run check:packages

      - name: Engine packages import boundaries
        run: npm run check:engine-imports
