# ES: CI mínimo — mismo gate que `npm run check:phase1`.
# EN: Minimal CI — same gate as `npm run check:phase1`.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  phase1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: check:phase1
        run: npm run check:phase1
