# ES: Override — publica MariaDB en el host. Si 3306 está ocupado (MySQL nativo), define MARIADB_HOST_PORT=3307 en .env.local.
# EN: Publishes MariaDB on host. If 3306 is taken (native MySQL), set MARIADB_HOST_PORT=3307 in .env.local.
#
# Uso / Usage (solo DB / DB only):
#   docker compose -f docker-compose.yml -f docker-compose.dev-db.yml up -d mariadb
#
# Luego en el host: npm run dev  (Next + Colyseus sin build de imagen de app)
# Then on host: npm run dev  (Next + Colyseus — no app image build)

services:
  mariadb:
    ports:
      - "127.0.0.1:${MARIADB_HOST_PORT:-3306}:3306"
